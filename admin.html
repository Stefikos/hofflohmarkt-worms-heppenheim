<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hofflohmarkt Admin</title>

<style>
body{
font-family:Arial;
margin:40px;
background:#f4f4f4;
}

h1{
margin-bottom:20px;
}

#upload{
padding:20px;
background:white;
border-radius:8px;
margin-bottom:30px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#f59e0b;
color:white;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<h1>Hofflohmarkt Formular Import</h1>

<div id="upload">

<input type="file" id="fotoInput" accept="image/*" capture="environment">

<p>Formular fotografieren oder Bild hochladen.</p>

<button id="export">participants.json exportieren</button>

</div>

<table id="tabelle">

<p><b>Erkannter Text:</b></p>
<pre id="debug"></pre>

<thead>
<tr>
<th>Stand</th>
<th>Adresse</th>
<th>Artikel</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const input = document.getElementById("fotoInput");
const tbody = document.querySelector("#tabelle tbody");

let daten = JSON.parse(localStorage.getItem("hofflohmarkt")) || [];

function speichern(){
localStorage.setItem("hofflohmarkt", JSON.stringify(daten));
}

function tabelleAktualisieren(){

tbody.innerHTML="";

daten.forEach(e=>{

const row=document.createElement("tr");

row.innerHTML = `
<td>${e.stand}</td>

<td> 
${renderArtikelCheckboxen(e)}
</td>

<td contenteditable="true" 
onblur="updateArtikel(${e.stand}, this.innerText)">
${e.artikel}
</td>

<td>${e.status}</td>

<td>
<button onclick="loeschen(${e.stand})">🗑</button>
</td>
`;

tbody.appendChild(row);

});

}

tabelleAktualisieren();

input.addEventListener("change", async e=>{

const file=e.target.files[0];
if(!file) return;

const neuerStand = daten.length+1;

const eintrag={
stand:neuerStand,
adresse:"wird erkannt...",
artikel:"wird erkannt...",
status:"⏳"
};

daten.push(eintrag);

speichern();
tabelleAktualisieren();

const result = await Tesseract.recognize(
file,
"deu"
);

const text = result.data.text.toLowerCase();

let artikel=[];

function istAngekreuzt(text, begriff){
  const index = text.indexOf(begriff);
  if(index === -1) return false;

  const umfeld = text.substring(index - 5, index + 20);
  return /x|×|\[x\]/.test(umfeld);
}

// ALLE Kategorien

if(istAngekreuzt(text,"babykleidung")) artikel.push("Babykleidung");
if(istAngekreuzt(text,"kinderkleidung")) artikel.push("Kinderkleidung");
if(istAngekreuzt(text,"erwachsenenkleidung")) artikel.push("Erwachsenenkleidung");

if(istAngekreuzt(text,"haushalt")) artikel.push("Haushalt");
if(istAngekreuzt(text,"möbel") || istAngekreuzt(text,"moebel")) artikel.push("Möbel");

if(istAngekreuzt(text,"schmuck")) artikel.push("Schmuck");

if(istAngekreuzt(text,"spielzeug")) artikel.push("Spielzeug");
if(istAngekreuzt(text,"spielgeräte") || istAngekreuzt(text,"spielgeraete")) artikel.push("Spielgeräte");

if(istAngekreuzt(text,"kinderbücher") || istAngekreuzt(text,"kinderbuecher")) artikel.push("Kinderbücher");
if(istAngekreuzt(text,"jugendbücher") || istAngekreuzt(text,"jugendbuecher")) artikel.push("Jugendbücher");
if(istAngekreuzt(text,"erwachsenenbücher") || istAngekreuzt(text,"erwachsenenbuecher")) artikel.push("Erwachsenenbücher");

if(istAngekreuzt(text,"sonstiges")) artikel.push("Sonstiges");

// Adresse grob erkennen
let adresse="Adresse prüfen";

const match = text.match(/[a-zäöüß]+\s+\d+/);

if(match) adresse = match[0] + ", 67551 Worms";

// Ergebnis eintragen
const letzter = daten[daten.length-1];

let adresseGefunden = false;

try{
const res = await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(adresse + ", 67551 Worms-Heppenheim"));
const data = await res.json();

if(data.length > 0){
letzter.latitude = data[0].lat;
letzter.longitude = data[0].lon;
adresseGefunden = true;
}
}catch(e){}

letzter.adresse = adresse;
letzter.artikel = artikel.join(", ");
if(!adresseGefunden){
  letzter.status = "⚠ Adresse prüfen";
}
else if(artikel.length === 0){
  letzter.status = "⚠ Artikel prüfen";
}
else{
  letzter.status = "✔";
}

speichern();
tabelleAktualisieren();

});

function loeschen(stand){
daten = daten.filter(e => e.stand !== stand);

speichern();
tabelleAktualisieren();
}

async function updateAdresse(stand, wert){

const eintrag = daten.find(e => e.stand === stand);
if(!eintrag) return;

eintrag.adresse = wert;
eintrag.status = "⏳ prüfen";

speichern();
tabelleAktualisieren();

let gefunden = false;

try{
const res = await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(wert + ", 67551 Worms-Heppenheim"));
const data = await res.json();

if(data.length > 0){
eintrag.latitude = data[0].lat;
eintrag.longitude = data[0].lon;
gefunden = true;
}
}catch(e){}

eintrag.status = gefunden ? "✔" : "⚠ Adresse prüfen";

speichern();
tabelleAktualisieren();
}

function updateArtikel(stand, wert){
const eintrag = daten.find(e => e.stand === stand);
if(eintrag){
eintrag.artikel = wert;
eintrag.status = "✏️ geändert";
speichern();
tabelleAktualisieren();
}
}

async function pruefeAdresse(stand){

const eintrag = daten.find(e => e.stand === stand);
if(!eintrag) return;

const adresse = eintrag.adresse + ", Worms";

try{
const res = await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(adresse));
const data = await res.json();

if(data.length > 0){

eintrag.latitude = data[0].lat;
eintrag.longitude = data[0].lon;
eintrag.status = "✔ Adresse gefunden";

}else{

eintrag.status = "⚠ Adresse prüfen";

}

}catch(e){
eintrag.status = "⚠ Fehler";
}

speichern();
tabelleAktualisieren();

}

function renderArtikelCheckboxen(e){

const liste = [
"Babykleidung",
"Kinderkleidung",
"Erwachsenenkleidung",
"Haushalt",
"Möbel",
"Schmuck und Sammlungen",
"Spielzeug",
"Spielgeräte/-fahrzeuge",
"Kinderbücher",
"Jugendbücher",
"Erwachsenenbücher",
"Sonstiges"
];

return liste.map(a => {
const checked = e.artikel && e.artikel.includes(a) ? "checked" : "";

return `
<label style="display:block">
<input type="checkbox" 
${checked}
onchange="toggleArtikel(${e.stand}, '${a}')">
${a}
</label>
`;
}).join("");
}

function toggleArtikel(stand, artikel){

const eintrag = daten.find(e => e.stand === stand);
if(!eintrag) return;

let liste = eintrag.artikel ? eintrag.artikel.split(", ").filter(a=>a) : [];

if(liste.includes(artikel)){
liste = liste.filter(a => a !== artikel);
}else{
liste.push(artikel);
}

eintrag.artikel = liste.join(", ");
eintrag.status = "✏️ geändert";

speichern();
tabelleAktualisieren();
}

</script>

</body>
</html>
