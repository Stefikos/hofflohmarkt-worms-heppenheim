<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hofflohmarkt Admin</title>

<style>
body{
font-family:Arial;
margin:40px;
background:#f4f4f4;
}

h1{
margin-bottom:20px;
}

#upload{
padding:20px;
background:white;
border-radius:8px;
margin-bottom:30px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#f59e0b;
color:white;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<h1>Hofflohmarkt Formular Import</h1>

<div id="upload">

<input type="file" id="fotoInput" accept="image/*" capture="environment">

<p>Formular fotografieren oder Bild hochladen.</p>

<button id="export">participants.json exportieren</button>

</div>

<table id="tabelle">

<thead>
<tr>
<th>Stand</th>
<th>Adresse</th>
<th>Artikel</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const input = document.getElementById("fotoInput");
const tbody = document.querySelector("#tabelle tbody");
const exportButton = document.getElementById("export");

let daten = JSON.parse(localStorage.getItem("hofflohmarkt")) || [];

function speichern(){
localStorage.setItem("hofflohmarkt", JSON.stringify(daten));
}

function tabelleAktualisieren(){

tbody.innerHTML="";

daten.forEach(e=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${e.stand}</td>
<td>${e.adresse}</td>
<td>${e.artikel}</td>
<td>${e.status}</td>
`;

tbody.appendChild(row);

});

}

tabelleAktualisieren();

input.addEventListener("change", async e=>{

const file=e.target.files[0];
if(!file) return;

const neuerStand = daten.length+1;

const eintrag={
stand:neuerStand,
adresse:"wird erkannt...",
artikel:"wird erkannt...",
status:"⏳"
};

daten.push(eintrag);

speichern();
tabelleAktualisieren();

const result = await Tesseract.recognize(
file,
"deu"
);

const text = result.data.text.toLowerCase();

let artikel=[];

if(text.includes("babykleidung"))
artikel.push("Babykleidung");

if(text.includes("kinderkleidung"))
artikel.push("Kinderkleidung");

if(text.includes("erwachsenenkleidung"))
artikel.push("Erwachsenenkleidung");

if(text.includes("haushalt"))
artikel.push("Haushalt");

if(text.includes("möbel") || text.includes("moebel"))
artikel.push("Möbel");

if(text.includes("schmuck"))
artikel.push("Schmuck und Sammlungen");

if(text.includes("spielzeug"))
artikel.push("Spielzeug");

if(text.includes("spielgeräte") || text.includes("spielgerate") || text.includes("fahrzeuge"))
artikel.push("Spielgeräte/-fahrzeuge");

if(text.includes("kinderbücher") || text.includes("kinderbuecher"))
artikel.push("Kinderbücher");

if(text.includes("jugendbücher") || text.includes("jugendbuecher"))
artikel.push("Jugendbücher");

if(text.includes("erwachsenenbücher") || text.includes("erwachsenenbuecher"))
artikel.push("Erwachsenenbücher");

if(text.includes("sonstiges"))
artikel.push("Sonstiges");

let adresse="Adresse prüfen";

const match = text.match(/[a-zäöüß]+(straße|strasse|ring|weg|gasse|platz)\s+\d+/);

if(match) adresse=match[0];
adresse = adresse + ", 67551 Worms-Heppenheim";

daten[daten.length-1].adresse=adresse;
daten[daten.length-1].artikel=artikel.join(", ");

daten[daten.length-1].status="✔";

speichern();
tabelleAktualisieren();

});


exportButton.addEventListener("click",()=>{

const json = JSON.stringify(daten,null,2);

const blob = new Blob([json],{type:"application/json"});

const url = URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download="participants.json";

a.click();

});

</script>

</body>
</html>
